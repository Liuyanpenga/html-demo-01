<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table标签</title>
  <style>
    table{
      table-layout: auto;     /*字体宽度*/
      border-collapse: collapse;   /*合并border*/
      border-spacing: 0;      /*设置边框距离*/
    }
    td,
    th{
      border: 1px solid pink;
    }
  </style>
</head>
<body>
  <table>
    <thead>
        <tr>
          <th></th>
          <th>小刘</th>
          <th>小李</th>
          <th>小王</th>
        </tr>
    </thead>
    <tbody>
      <tr>    
        <th>语文</th>
        <td>90</td>
        <td>80</td>
        <td>90</td>
      </tr>
      <tr>    
        <th>语文</th>
        <td>90</td>
        <td>80</td>
        <td>90</td>
      </tr><tr>  
        <th>数学</th>
        <td>90</td>
        <td>80</td>
        <td>90</td>
      </tr><tr>
        <th>英语</th>
        <td>90</td>
        <td>80</td>
        <td>90</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <th>总分</th>
        <td>200</td>
        <td>222</td>
        <td>232</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
